# GitHub Projects configuration
githubProjects:
  - name: Test sync project
    storyPoints:
      fieldName: Story Points
      type: number
    status:
      fieldName: Status
      type: singleSelect
    sprint:
      fieldName: Iteration
      type: iteration
    priority:
      fieldName: Priority
      type: singleSelect

# Status mappings (GitHub → Jira)
statusTypeMappings:
  - name: Test Status Mapping
    default: New
    mapping:
      - fromGithub: Todo
        toJira: New
      - fromGithub: In progress
        toJira: In Progress
      - fromGithub: Done
        toJira: Closed

# Issue type mappings (GitHub labels → Jira issue types)
issuesTypeMappings:
  - name: Test Issue Mapping
    default: Task
    mapping:
      - fromGithubLabel: epic
        toJira: Epic
      - fromGithubLabel: bug
        toJira: Bug
      - fromGithubLabel: task
        toJira: Task
      - fromGithubLabel: story
        toJira: Story

# Priority mappings (GitHub → Jira)
priorityTypeMappings:           # Optional - omit if not syncing priority
  - name: My Priority Mapping
    default: Normal              # Default Jira priority when no mapping matches
    mapping:
      - fromGithub: P0     # Exact GitHub priority value
        toJira: Critical         # Jira priority name (depends on your Jira instance)
      - fromGithub: P1
        toJira: Major
      - fromGithub: P0
        toJira: Minor

# Sync configuration
syncProjects:
  - name: "Jira Sync Test"
    github:
      owner: mattreid           # ← UPDATE THIS
      repo: test-sync-repo             # ← UPDATE THIS
      project: Test sync project
      afterDate: 2026-06-01            # Sync issues updated after this date
    useMapping:
      issueType: Test Issue Mapping
      statusType: Test Status Mapping
      priorityType: My Priority Mapping
    jira:
      projectKey: DPROD               # ← UPDATE THIS
      component: Upstream        # ← UPDATE THIS
      sprintBoard: GH Sync Test          # ← UPDATE THIS (your board name)
    maxBatchSize: 15

      # NEW: External repo - basic mode
  - name: "Fabric8 Kubernetes Client - manusa's issues"
    github:
      owner: fabric8io
      repo: kubernetes-client
      afterDate: "2026-06-01T00:00:00Z"
      syncMode: basic                  # Basic mode - no Projects v2, no token required
      assigneeAllowlist:               # Only sync issues assigned to manusa
        - manusa
    useMapping:
      issueType: Test Issue Mapping
      statusType: Test Status Mapping
      priorityType: My Priority Mapping
    jira:
      projectKey: DPROD
      component: Upstream
      globalIdPrefix: FABRIC8-K8S
      sprintBoard: ""                  # Not used in basic mode
    maxBatchSize: 50
